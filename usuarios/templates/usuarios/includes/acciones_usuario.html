<div class="d-inline-flex gap-2">
    <a
        href="{% url 'usuarios:editar_usuario' usuario.pk %}"
        class="btn btn-outline-primary btn-sm"
        title="Editar usuario"
        aria-label="Editar usuario"
    >
        {% include "includes/icon.html" with name="pencil" %}
    </a>
    {% if usuario.pk == user.pk and usuario.is_active %}
        <span class="d-inline-block" title="No puedes desactivar tu propio usuario.">
            <button
                type="button"
                class="btn btn-outline-secondary text-muted btn-sm"
                aria-label="No puedes desactivar tu propio usuario."
                disabled
            >
                {% include "includes/icon.html" with name="power" %}
            </button>
        </span>
    {% else %}
        <form
            method="post"
            action="{% url 'usuarios:cambiar_estado_usuario' usuario.pk %}"
            data-confirm-submit
            data-confirm-title="{% if usuario.is_active %}Desactivar usuario{% else %}Activar usuario{% endif %}"
            data-confirm-text="{% if usuario.is_active %}El usuario no podrá iniciar sesión mientras esté inactivo.{% else %}El usuario volverá a poder iniciar sesión.{% endif %}"
            data-confirm-button="{% if usuario.is_active %}Desactivar{% else %}Activar{% endif %}"
            data-confirm-color="{% if usuario.is_active %}#b42318{% else %}#2f5d50{% endif %}"
        >
            {% csrf_token %}
            <button
                type="submit"
                class="btn {% if usuario.is_active %}btn-success{% else %}btn-outline-secondary{% endif %} btn-sm"
                title="{% if usuario.is_active %}Desactivar usuario{% else %}Activar usuario{% endif %}"
                aria-label="{% if usuario.is_active %}Desactivar usuario{% else %}Activar usuario{% endif %}"
            >
                {% include "includes/icon.html" with name="power" %}
            </button>
        </form>
    {% endif %}
</div>
