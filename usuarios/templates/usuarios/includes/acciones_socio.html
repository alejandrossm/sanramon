<div class="d-inline-flex gap-2">
    <a
        href="{% url 'usuarios:editar_socio' socio.pk %}"
        class="btn btn-outline-primary btn-sm"
        title="Editar socio"
        aria-label="Editar socio"
    >
        {% include "includes/icon.html" with name="pencil" %}
    </a>
    <form
        method="post"
        action="{% url 'usuarios:cambiar_estado_usuario' socio.pk %}"
        data-confirm-submit
        data-confirm-title="{% if socio.is_active %}Desactivar socio{% else %}Activar socio{% endif %}"
        data-confirm-text="{% if socio.is_active %}El socio no podrá iniciar sesión mientras esté inactivo.{% else %}El socio volverá a poder iniciar sesión.{% endif %}"
        data-confirm-button="{% if socio.is_active %}Desactivar{% else %}Activar{% endif %}"
        data-confirm-color="{% if socio.is_active %}#b42318{% else %}#2f5d50{% endif %}"
    >
        {% csrf_token %}
        <button
            type="submit"
            class="btn {% if socio.is_active %}btn-success{% else %}btn-outline-secondary{% endif %} btn-sm"
            title="{% if socio.is_active %}Desactivar socio{% else %}Activar socio{% endif %}"
            aria-label="{% if socio.is_active %}Desactivar socio{% else %}Activar socio{% endif %}"
        >
            {% include "includes/icon.html" with name="power" %}
        </button>
    </form>
</div>
